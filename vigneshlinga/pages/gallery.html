<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Vignesh Linga Constructions</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            height: 300px;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(212, 175, 55, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        .gallery-overlay i {
            font-size: 2rem;
            color: white;
        }

        /* Simple Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 3px solid var(--primary-gold);
            border-radius: 10px;
        }
        #lightbox-close {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="preloader"><div class="loader-logo">VLC</div></div>
    
    <nav>
        <div class="container nav-container">
            <a href="../index" class="logo">Vignesh<span>Linga</span></a>
            <ul class="nav-links">
                <li><a href="../index">Home</a></li>
                <li><a href="about">About</a></li>
                <li><a href="services">Services</a></li>
                <li><a href="projects">Projects</a></li>
                <li><a href="gallery">Gallery</a></li>
                <li><a href="contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="section-padding" style="text-align: center; padding-top: 150px;">
        <div class="container">
            <h1 style="font-size: 3.5rem;">Visual <span class="text-gold">Excellence</span></h1>
            <p style="color: var(--muted-text); max-width: 700px; margin: 20px auto;">Capturing the essence of precision and grandeur in every frame.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container gallery-grid">
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1487958449913-d92203df6dc5?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
            <div class="gallery-item animate-on-scroll" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://images.unsplash.com/photo-1531834363745-f09802bd26a1?q=80&w=2070&auto=format&fit=crop" alt="Construction Image">
                <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
            </div>
        </div>
    </section>

    <div id="lightbox">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Vignesh Linga Constructions. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }
        
        // Close lightbox on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
